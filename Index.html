<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>StudySphere V5</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800;900&display=swap" rel="stylesheet">

<style>

body{
background:#050507;
color:white;
font-family:Montserrat,sans-serif;
overflow-x:hidden;
cursor:none;
}

/* blob cursor */

#cursor{
position:fixed;
width:26px;
height:26px;
border-radius:50%;
background:#ff0a78;
pointer-events:none;
mix-blend-mode:difference;
z-index:9999;
}

#trail{
position:fixed;
width:12px;
height:12px;
border-radius:50%;
background:#ff0a78;
opacity:.6;
pointer-events:none;
z-index:9998;
}

/* floating lights */

.light{
position:fixed;
width:420px;
height:420px;
border-radius:50%;
filter:blur(120px);
opacity:.35;
z-index:-1;
animation:float 15s infinite ease-in-out;
}

.l1{background:#ff0a78;left:10%;top:20%}
.l2{background:#6b5cff;right:10%;top:40%}
.l3{background:#00d2ff;left:30%;bottom:10%}

@keyframes float{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-80px)}
}

/* cards */

.card{
background:rgba(255,255,255,.05);
backdrop-filter:blur(20px);
border-radius:24px;
padding:40px;
border:1px solid rgba(255,255,255,.1);
}

/* buttons */

.btn{
background:linear-gradient(135deg,#ff0a78,#ff2d8f);
padding:16px;
border-radius:14px;
margin-top:20px;
font-weight:bold;
width:100%;
transition:.3s;
}

.btn:hover{
transform:translateY(-4px);
box-shadow:0 20px 40px rgba(255,10,120,.5);
}

/* sections */

.section{
display:none;
min-height:100vh;
align-items:center;
justify-content:center;
flex-direction:column;
padding:40px;
}

.section.active{display:flex}

/* option cards */

.option{
background:#0d0d11;
padding:18px;
border-radius:14px;
cursor:pointer;
transition:.25s;
}

.option:hover{
background:#ff0a7820;
transform:scale(1.03);
}

/* modules */

.module{
background:#0d0d11;
padding:18px;
border-radius:14px;
margin-top:10px;
}

.gradient{
background:linear-gradient(135deg,#ff0a78,#ff2d8f);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* loader */

.loader{
width:80px;
height:80px;
border-radius:50%;
border:4px solid rgba(255,10,120,.2);
border-top:4px solid #ff0a78;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

</style>

</head>

<body>

<div id="cursor"></div>
<div id="trail"></div>

<div class="light l1"></div>
<div class="light l2"></div>
<div class="light l3"></div>

<!-- INTRO -->

<div id="intro" class="section active text-center">

<h1 class="text-7xl font-black gradient mb-6">
StudySphere
</h1>

<p class="text-gray-400 tracking-widest">
Decoding Human Potential...
</p>

</div>

<!-- PROFILE -->

<div id="profile" class="section">

<div class="card max-w-xl w-full">

<h2 class="text-3xl font-bold mb-6">Basic Information</h2>

<input id="name" class="w-full p-3 bg-black rounded mb-3" placeholder="Name">

<input id="age" class="w-full p-3 bg-black rounded mb-3" placeholder="Age">

<select id="occupation" class="w-full p-3 bg-black rounded mb-3">
<option>Student</option>
<option>Professional</option>
<option>Entrepreneur</option>
</select>

<select id="qualification" class="w-full p-3 bg-black rounded mb-3">
<option>School</option>
<option>Bachelor</option>
<option>Master</option>
<option>PhD</option>
</select>

<button class="btn" onclick="goTalent()">Continue</button>

</div>

</div>

<!-- TALENT CHOICE -->

<div id="talentChoice" class="section">

<div class="card text-center max-w-xl w-full">

<h2 class="text-2xl font-bold mb-6">
Do you know your talent?
</h2>

<button class="btn" onclick="show('talentSelect')">Yes</button> <button class="btn" onclick="startDiscovery()">Discover</button>

</div>

</div>

<!-- TALENT SELECT -->

<div id="talentSelect" class="section">

<div class="card max-w-xl w-full">

<h2 class="text-xl font-bold mb-6">Choose Talent</h2>

<div class="space-y-3">

<div class="option" onclick="selectTalent('AI')">Artificial Intelligence</div>
<div class="option" onclick="selectTalent('Design')">Design</div>
<div class="option" onclick="selectTalent('Business')">Business</div>
<div class="option" onclick="selectTalent('Data')">Data Science</div>

</div>

</div>

</div>

<!-- QUIZ -->

<div id="quiz" class="section">

<div class="card max-w-xl w-full">

<h2 id="question" class="text-xl font-bold mb-6"></h2>

<div id="options" class="space-y-3"></div>

</div>

</div>

<!-- LOADING -->

<div id="loading" class="section">

<div class="loader"></div>
<p class="mt-6 text-gray-400">Analyzing cognition...</p>

</div>

<!-- COURSE OPTIONS -->

<div id="courses" class="section">

<div class="card max-w-2xl w-full">

<h2 class="text-3xl gradient font-black mb-6">
Recommended Courses
</h2>

<div id="courseOptions"></div>

</div>

</div>

<!-- GENERATED COURSE -->

<div id="generated" class="section">

<div class="card max-w-2xl w-full">

<h2 id="courseTitle" class="text-4xl gradient font-black mb-4"></h2>

<p id="coursePrice"></p>

<h3 class="mt-6 mb-3 text-xl">Course Roadmap</h3>

<div id="modules"></div>

</div>

</div>

<script>

/* cursor */

const cursor=document.getElementById("cursor")
const trail=document.getElementById("trail")

let tx=0,ty=0

window.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px"
cursor.style.top=e.clientY+"px"

tx+=(e.clientX-tx)*0.2
ty+=(e.clientY-ty)*0.2

trail.style.left=tx+"px"
trail.style.top=ty+"px"
})

/* navigation */

function show(id){
document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

/* intro */

setTimeout(()=>show("profile"),2500)

/* talent */

let userTalent=""

function goTalent(){
show("talentChoice")
}

function selectTalent(t){
userTalent=t
skillQuiz()
}

/* discovery */

const discoveryQuestions=[
{
q:"You enjoy solving problems by",
o:["Analyzing patterns","Designing visuals","Building products","Working with data"]
},
{
q:"What excites you most?",
o:["AI systems","Design interfaces","Business ideas","Data insights"]
},
{
q:"Your thinking style",
o:["Logical","Creative","Strategic","Analytical"]
}
]

let dq=0
let answers=[]

function startDiscovery(){
dq=0
answers=[]
show("quiz")
renderDiscovery()
}

function renderDiscovery(){

if(dq>=discoveryQuestions.length){
computeTalent()
return
}

let q=discoveryQuestions[dq]

document.getElementById("question").innerText=q.q

let opt=document.getElementById("options")
opt.innerHTML=""

q.o.forEach((t,i)=>{

let d=document.createElement("div")
d.className="option"
d.innerText=t

d.onclick=()=>{
answers.push(i)
dq++
renderDiscovery()
}

opt.appendChild(d)

})

}

function computeTalent(){

const talents=["AI","Design","Business","Data"]

userTalent=talents[Math.floor(Math.random()*4)]

skillQuiz()

}

/* skill quiz */

const skillQuestions=[
{
q:"Your experience level?",
o:["Beginner","Intermediate","Advanced"]
},
{
q:"How fast do you learn tools?",
o:["Slow","Moderate","Fast"]
}
]

let sq=0

function skillQuiz(){

sq=0
show("quiz")
renderSkill()

}

function renderSkill(){

if(sq>=skillQuestions.length){
analysis()
return
}

let q=skillQuestions[sq]

document.getElementById("question").innerText=q.q

let opt=document.getElementById("options")
opt.innerHTML=""

q.o.forEach((t,i)=>{

let d=document.createElement("div")
d.className="option"
d.innerText=t

d.onclick=()=>{
sq++
renderSkill()
}

opt.appendChild(d)

})

}

function analysis(){
show("loading")
setTimeout(showCourses,2000)
}

/* course library */

const courseLibrary={

Design:[
{
title:"UI UX Design",
price:"₹1499/month",
modules:[
"Design Thinking",
"UX Psychology",
"Wireframing",
"Figma Mastery",
"Usability Testing",
"Portfolio Project"
]
},
{
title:"Product Design",
price:"₹1999/month",
modules:[
"User Research",
"Interaction Design",
"Prototyping",
"Product Strategy",
"Case Study Project"
]
}
],

AI:[
{
title:"Machine Learning Engineer",
price:"₹2999/month",
modules:[
"Python",
"Statistics",
"Machine Learning",
"Deep Learning",
"AI Projects"
]
}
],

Business:[
{
title:"Startup Builder",
price:"₹1999/month",
modules:[
"Idea Validation",
"Market Research",
"Product Building",
"Growth Marketing",
"Fundraising"
]
}
],

Data:[
{
title:"Data Scientist",
price:"₹2499/month",
modules:[
"Python",
"Statistics",
"Machine Learning",
"Data Visualization",
"Analytics Project"
]
}
]

}

/* show course options */

function showCourses(){

show("courses")

let container=document.getElementById("courseOptions")
container.innerHTML=""

courseLibrary[userTalent].forEach((c,i)=>{

let div=document.createElement("div")
div.className="option mb-3"

div.innerHTML=`
<h3>${c.title}</h3>
<p class="text-gray-400">${c.price}</p>
`

div.onclick=()=>generateCourse(i)

container.appendChild(div)

})

}

/* generate selected course */

function generateCourse(i){

let course=courseLibrary[userTalent][i]

show("generated")

document.getElementById("courseTitle").innerText=course.title
document.getElementById("coursePrice").innerText="Price: "+course.price

let mod=document.getElementById("modules")
mod.innerHTML=""

course.modules.forEach((m,i)=>{

let div=document.createElement("div")
div.className="module"
div.innerHTML=`Module ${i+1}: ${m}`

mod.appendChild(div)

})

gsap.from(".module",{opacity:0,y:30,stagger:0.2})

}

</script>

</body>
</html>
